<div class="page">
  <h1>Manajemen User</h1>
  <p class="subtitle">Tambah akun Owner atau Kasir baru, dan lihat daftar user yang sudah ada</p>

  <div class="grid-2">
    <div class="card">
      <h3>Tambah User Baru</h3>
      <form id="userForm" style="margin-top:14px;">
        <div class="field">
          <label>Nama</label>
          <input type="text" id="userNama" placeholder="Nama lengkap">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="userEmail" required placeholder="email@contoh.com">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="text" id="userPassword" required placeholder="Minimal 6 karakter">
        </div>
        <div class="field">
          <label>Role</label>
          <select id="userRole">
            <option value="kasir">Kasir</option>
            <option value="owner">Owner</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Buat User</button>
      </form>
    </div>

    <div class="card">
      <h3>Daftar User</h3>
      <div class="table-wrap" style="margin-top:10px;">
        <table>
          <thead><tr><th>Nama</th><th>Email</th><th>Role</th><th>Dibuat</th></tr></thead>
          <tbody id="userTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
