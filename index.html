<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir — ARENSI POS</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="topbar">
  <div class="brand">
    <svg class="logo-mark" width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 1C10 1 4 8 4 12.5C4 15.5 6.5 18 10 18C13.5 18 16 15.5 16 12.5C16 8 10 1 10 1Z" fill="#D4862E"/></svg>ARENSI <span>POS</span>
  </div>
  <nav>
    <a href="index.html" class="active">Kasir</a>
    <a href="produksi.html" class="owner-only">Produksi &amp; Stok</a>
    <a href="bahan-baku.html" class="owner-only">Bahan Baku</a>
    <a href="supplier.html" class="owner-only">Supplier &amp; PO</a>
    <a href="riwayat.html" class="owner-only">Riwayat</a>
    <a href="users.html" class="owner-only">User</a>
    <a href="dashboard.html" class="owner-only">Laporan</a>
    <a href="#" onclick="logout();return false;">Keluar</a>
  </nav>
</div>

<div class="page">
  <h1>Kasir</h1>
  <p class="subtitle">Pilih produk, lalu selesaikan pembayaran</p>

  <div class="grid-2">
    <div class="card">
      <div style="display:flex;gap:8px;">
        <input type="text" id="searchProduct" placeholder="Cari produk..." style="flex:1;">
        <button class="btn btn-secondary" type="button" onclick="scanForCart()" style="white-space:nowrap;">Scan</button>
      </div>
      <div class="product-grid" id="productGrid"></div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:12px;">Keranjang</h3>
      <div id="cartItems"></div>
      <div id="cartAlert"></div>

      <div class="total-row grand">
        <span>Total Belanja</span>
        <span id="totalBelanja">Rp 0</span>
      </div>

      <div class="field" style="margin-top:14px;">
        <label>Metode Pembayaran</label>
        <select id="metodeBayar">
          <option value="Cash">Cash</option>
          <option value="QRIS">QRIS</option>
          <option value="Transfer">Transfer</option>
        </select>
      </div>

      <div class="field">
        <label>Uang Bayar</label>
        <input type="number" id="uangBayar" placeholder="0">
      </div>

      <div class="total-row">
        <span>Kembalian</span>
        <strong id="uangKembalian">Rp 0</strong>
      </div>

      <button class="btn btn-primary btn-block" id="btnCheckout" onclick="checkout()" disabled style="margin-top:10px;">Selesaikan transaksi</button>
    </div>
  </div>
</div>

<div id="receiptModal" style="display:none;position:fixed;inset:0;background:rgba(61,40,23,0.55);align-items:center;justify-content:center;z-index:50;">
  <div class="card" style="width:320px;max-height:80vh;overflow:auto;">
    <div id="receiptPrintArea" class="print-area">
      <h3 style="text-align:center;margin-bottom:2px;">ARENSI</h3>
      <p style="text-align:center;font-size:12px;color:var(--brown-500);margin-bottom:12px;">Struk Transaksi</p>
      <div id="receiptBody"></div>
    </div>
    <button class="btn btn-primary btn-block no-print" style="margin-top:14px;" onclick="window.print()">Print / Simpan PDF</button>
    <button class="btn btn-secondary btn-block no-print" style="margin-top:8px;" onclick="closeReceipt()">Tutup</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/scanner.js"></script>
<script src="js/kasir.js"></script>
</body>
</html>
