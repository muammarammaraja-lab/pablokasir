<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riwayat Penjualan — ARENSI POS</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="topbar">
  <div class="brand">
    <svg class="logo-mark" width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 1C10 1 4 8 4 12.5C4 15.5 6.5 18 10 18C13.5 18 16 15.5 16 12.5C16 8 10 1 10 1Z" fill="#D4862E"/></svg>ARENSI <span>POS</span>
  </div>
  <nav>
    <a href="index.html">Kasir</a>
    <a href="produksi.html" class="owner-only">Produksi &amp; Stok</a>
    <a href="bahan-baku.html" class="owner-only">Bahan Baku</a>
    <a href="riwayat.html" class="owner-only active">Riwayat</a>
    <a href="dashboard.html" class="owner-only">Laporan</a>
    <a href="#" onclick="logout();return false;">Keluar</a>
  </nav>
</div>

<div class="page">
  <h1>Riwayat Penjualan</h1>
  <p class="subtitle">Cari dan lihat detail transaksi yang sudah terjadi</p>

  <form id="filterForm" class="filter-bar">
    <div class="field">
      <label>Dari Tanggal</label>
      <input type="date" id="filterDari">
    </div>
    <div class="field">
      <label>Sampai Tanggal</label>
      <input type="date" id="filterSampai">
    </div>
    <div class="field">
      <label>Cari No. Transaksi</label>
      <input type="text" id="filterCari" placeholder="INV-20260617-0001">
    </div>
    <div class="field">
      <label style="visibility:hidden;">Cari</label>
      <button type="submit" class="btn btn-primary">Cari</button>
    </div>
  </form>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr><th>No. Transaksi</th><th>Tanggal</th><th>Total</th><th>Metode</th><th>Kasir</th><th></th></tr></thead>
        <tbody id="riwayatBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="detailModal" style="display:none;position:fixed;inset:0;background:rgba(61,40,23,0.55);align-items:center;justify-content:center;z-index:50;">
  <div class="card" style="width:320px;max-height:80vh;overflow:auto;">
    <h3 style="margin-bottom:10px;">Detail Transaksi</h3>
    <div id="detailBody"></div>
    <button class="btn btn-secondary btn-block" style="margin-top:14px;" onclick="closeDetail()">Tutup</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/riwayat.js"></script>
</body>
</html>
